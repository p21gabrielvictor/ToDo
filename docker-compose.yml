version: '3.8'

services:
  # Banco de Dados para o Showdesk
  postgres:
    image: postgres:16-alpine
    container_name: showdesk_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: showdesk
    volumes:
      - ./pgdata:/var/lib/postgresql/data # Cria uma pasta pgdata no seu projeto
    ports:
      - "5432:5432"

  # n8n - O cérebro da integração
  n8n:
    image: n8nio/n8n:latest
    container_name: showdesk_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173 # Porta do seu Vite
    volumes:
      - ./n8n_data:/home/node/.n8n # Salva seus workflows localmente
    depends_on:
      - postgres